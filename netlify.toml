# Netlify build configuration for de-bedrijfskompas.
# The project lives at the repo root, so `base` is left unset (the example
# template's `base = "project/"` does not apply here).

[build]
  # .gitmodules uses HTTPS URLs (both vendor repos are public), so Netlify
  # checks out the submodules itself during clone — no SSH key needed. The
  # build only needs vendor/ontwerp (src/styles/global.css @imports its Tailwind
  # theme, tokens, and fonts); vendor/byom is constitution/docs authority only.
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # MAPBOX_PUBLIC_TOKEN MUST be set in the Netlify UI (Site settings →
  # Environment variables) — the Astro build fails fast without it (MapPage.astro
  # reads it at build time via import.meta.env). It is a public pk. Mapbox token
  # (client-side by design), but GitHub push-protection blocks committing it, so
  # it is provided through the UI, not this file.
  # GH_TOKEN is OPTIONAL. The pipeline repo
  # (floriskappen/de-bedrijfskompas-pipeline) is public, so the build fetches
  # src/data/companies.json anonymously without any secret. Set GH_TOKEN in the
  # Netlify UI (Site settings → Environment variables) only if you want the
  # higher authenticated rate limit (5000 req/hr vs 60) — e.g. for very frequent
  # deploys. Never put a (secret) token in this file.
